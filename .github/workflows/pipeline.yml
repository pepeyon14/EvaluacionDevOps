name: Pipeline DevOps CampusFlow IA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validacion:
    name: Validar aplicacion
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar ESLint
        run: npm run lint

      - name: Ejecutar pruebas con Jest
        run: npm test

      - name: Construir imagen Docker
        run: docker build -t campusflow-ia .